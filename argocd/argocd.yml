apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yash-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sawant-yash/aws-lb-controller-domain-configuration.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
